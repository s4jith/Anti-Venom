name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[langchain,dev]"

      - name: Lint
        run: uv run ruff check antivenom/

      - name: Type check
        run: uv run mypy antivenom/ --ignore-missing-imports

      - name: Run unit tests
        run: uv run pytest tests/unit/ -q --tb=short

      - name: Run integration tests
        run: uv run pytest tests/integration/ -q --tb=short

      - name: Build benchmark dataset
        run: uv run python scripts/build_benchmark_dataset.py --builtin-only

      - name: Run benchmark (enforced gate)
        # CI installs no semantic/classifier extras, so FAST+MEDIUM regex layers
        # set the floor at 0.70 recall. Raise to 0.90 once [semantic] is in CI.
        run: uv run python -m antivenom.benchmark --fail-below-recall 0.70
